<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress+</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(circle at 10% 6%, rgba(124, 100, 255, 0.14), transparent 32%),
        radial-gradient(circle at 90% 0%, rgba(255, 138, 61, 0.14), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(21, 157, 235, 0.10), transparent 38%),
        linear-gradient(160deg, #F4F8F2 0%, #E9F3EA 45%, #F6F9F4 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px 0;
      font-family: Inter, sans-serif;
    }
    @keyframes ppSheetUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes ppToastIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes ppFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes ppPulse { 0%, 100% { transform: scale(1); opacity: .78; } 50% { transform: scale(1.08); opacity: 1; } }
    @keyframes ppPop { 0% { transform: scale(.86); opacity: 0; } 60% { transform: scale(1.04); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes ppShimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes ppSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    input::placeholder { color: #A8A498; }
    input:focus { box-shadow: none; outline: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #E8E2D2; border-radius: 4px; }
    #root { width: 100%; max-width: 430px; }
    button { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ─── Storage shim (usa localStorage en el navegador) ──────────────────────────
window.storage = {
  get: async (key) => {
    try {
      const v = localStorage.getItem(key);
      return v ? { value: v } : null;
    } catch { return null; }
  },
  set: async (key, value) => {
    try { localStorage.setItem(key, value); return true; } catch { return null; }
  },
};

// ─── Constantes ───────────────────────────────────────────────────────────────
const STORAGE_KEY = "pp_user_data_v1";

const ACTIVITY_LEVELS = [
  { id: "sedentario", label: "Sedentario", desc: "Poco o nada de ejercicio", factor: 1.2 },
  { id: "ligero", label: "Ligero", desc: "Ejercicio leve 1-3 días/sem", factor: 1.375 },
  { id: "moderado", label: "Moderado", desc: "Ejercicio moderado 3-5 días/sem", factor: 1.55 },
  { id: "intenso", label: "Intenso", desc: "Ejercicio intenso 6-7 días/sem", factor: 1.725 },
];

const GOALS = [
  { id: "bajar_peso", label: "Bajar de peso", icon: "↓", desc: "Déficit calórico moderado y sostenible", adj: -0.18 },

  { id: "mantener", label: "Mantener peso", icon: "=", desc: "Equilibrio calórico estable", adj: 0 },
  { id: "mejorar_habitos", label: "Mejorar hábitos saludables", icon: "+", desc: "Foco en constancia, no en el número", adj: -0.03 },

const MEAL_SLOTS = [
  { id: "desayuno", label: "Desayuno" },
  { id: "almuerzo", label: "Almuerzo" },
  { id: "merienda", label: "Merienda" },
  { id: "cena", label: "Cena" },
];

const FOOD_CATALOG = [

const TRAINING_TYPES = [

const ACHIEVEMENT_DEFS = [
  { id: "primer_registro", label: "Primer paso", desc: "Registraste tu primera comida", icon: "🌱" },
  { id: "hidratacion_3", label: "Constancia líquida", desc: "Cumpliste tu meta de agua 3 días", icon: "💧" },
  { id: "entreno_5", label: "En movimiento", desc: "Registraste 5 entrenamientos", icon: "🏃" },
  { id: "semana_completa", label: "Primera semana", desc: "7 días con al menos un registro", icon: "📅" },
  { id: "racha_agua_7", label: "Bien hidratado", desc: "7 días seguidos cumpliendo la meta de agua", icon: "🌊" },
  { id: "peso_registrado", label: "Punto de partida", desc: "Registraste tu peso por primera vez", icon: "⚖️" },
];

const COLORS = {

  moss: "#35C757", mossDark: "#087A2A", mossLight: "#E7F9ED",
  clay: "#F27B2D", clayLight: "#FFF0E5", clayDark: "#C25A14",
  water: "#159DEB", waterLight: "#E8F7FF", waterDark: "#0D6FAE",
  graphite: "#63716A", cream: "#FFFFFF",
  mint: "#CFF8DE", yellow: "#FFD05A", yellowDark: "#E8A400", lilac: "#F1EDFF",
  rose: "#FFE9EF", navy: "#172C24",
  violet: "#7C64FF", violetLight: "#EFEBFF", violetDark: "#5A40D6",
  coral: "#FF5C7A", coralLight: "#FFE4EA",
  amber: "#FFB23E", amberLight: "#FFF3DE",
  teal: "#15C5C1", tealLight: "#E2FBFA",
  gold: "#F2B705",
};

// ─── Utilidades ───────────────────────────────────────────────────────────────
const todayISO = () => new Date().toISOString().slice(0, 10);
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function defaultProfile() {
  return {
    account: { name: "Usuario", email: "usuario@progressplus.app" },
    profile: { age: 30, weight: 70, height: 170, sex: "masculino", activity: "moderado" },
    goal: "mantener",
    weightLog: [{ id: "init", date: todayISO(), weight: 70 }],
    meals: [], water: [], workouts: [], achievements: [],
    settings: { notifWater: true, notifMeals: true, notifWorkouts: true, notifAchievements: true, waterReminderFreqHours: 2, units: "metric" },
    onboardingDone: true,
  };
}

function calcBMR({ weight, height, age, sex }) {
  return sex === "femenino"
    ? 10 * weight + 6.25 * height - 5 * age - 161
    : 10 * weight + 6.25 * height - 5 * age + 5;
}
function calcCalorieGoal(profile, goalId) {
  const bmr = calcBMR(profile);
  const activity = ACTIVITY_LEVELS.find(a => a.id === profile.activity) || ACTIVITY_LEVELS[0];
  const goal = GOALS.find(g => g.id === goalId) || GOALS[2];
  return Math.max(1200, Math.round(bmr * activity.factor * (1 + goal.adj) / 10) * 10);
}
function calcWaterGoalMl(profile) {
  const activity = ACTIVITY_LEVELS.find(a => a.id === profile.activity) || ACTIVITY_LEVELS[0];
  const bonus = activity.id === "intenso" ? 500 : activity.id === "moderado" ? 300 : 0;
  return Math.round((profile.weight * 35 + bonus) / 50) * 50;
}
function macroSplit(calorieGoal, goalId) {
  let pPct = 0.3, cPct = 0.4, gPct = 0.3;
  if (goalId === "ganar_masa") { pPct = 0.32; cPct = 0.43; gPct = 0.25; }
  if (goalId === "bajar_peso") { pPct = 0.33; cPct = 0.35; gPct = 0.32; }
  if (goalId === "mejorar_habitos") { pPct = 0.28; cPct = 0.42; gPct = 0.3; }
  return {
    protein: Math.round(calorieGoal * pPct / 4),
    carbs: Math.round(calorieGoal * cPct / 4),
    fat: Math.round(calorieGoal * gPct / 9),
  };
}

// ─── Toast hook ───────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, tone = "ok") => {
    const id = uid();
    setToasts(t => [...t, { id, msg, tone }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);
  return { toasts, push };
}

// ─── Componentes base ─────────────────────────────────────────────────────────
function Icon({ name, size = 20, color = "currentColor" }) {
  const paths = {
    home: "M4 11.5 12 4l8 7.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1Z",
    bowl: "M3 12h18a9 9 0 0 1-18 0Zm3-3a6 6 0 0 1 12 0",
    drop: "M12 2s7 8 7 13a7 7 0 0 1-14 0c0-5 7-13 7-13Z",
    dumbbell: "M4 9v6M2 10v4M20 9v6M22 10v4M7 12h10M7 9v6M17 9v6",
    chart: "M4 20V10M10 20V4M16 20v-8M22 20H2",
    user: "M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0",
    settings: "M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm8.5-3.5c0 .4 0 .8-.1 1.2l1.8 1.4-1.8 3.1-2.1-.6a7.6 7.6 0 0 1-2 1.2L16 21h-3.6l-.3-2.2a7.6 7.6 0 0 1-2-1.2l-2.1.6-1.8-3.1 1.8-1.4A6 6 0 0 1 7.9 12c0-.4 0-.8.1-1.2L6.2 9.4 8 6.3l2.1.6a7.6 7.6 0 0 1 2-1.2L12.4 3H16l.3 2.2a7.6 7.6 0 0 1 2 1.2l2.1-.6 1.8 3.1-1.8 1.4c.1.4.1.8.1 1.2Z",
    plus: "M12 5v14M5 12h14",
    check: "M5 13l4 4L19 7",
    back: "M19 12H5M11 18l-6-6 6-6",
    edit: "M4 20h4l11-11-4-4L4 16Z",
    trash: "M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0-1 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 6",
    bell: "M6 9a6 6 0 1 1 12 0c0 4 1.5 5.5 1.5 6.5H4.5C4.5 14.5 6 13 6 9Zm4.5 9.5a1.5 1.5 0 0 0 3 0",
    logout: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9",
    search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm10 2-4.3-4.3",
    scale: "M12 3v3M5 6h14l2 7a4 4 0 0 1-8 0 4 4 0 0 1-8 0l2-7Z",
    close: "M6 6l12 12M18 6 6 18",
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
      <path d={paths[name] || ""} />
    </svg>
  );
}

function ProgressRing({ value, max, size = 180, stroke = 14, color = COLORS.moss, trackColor = COLORS.paperLine, children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.min(1, max > 0 ? value / max : 0);
  const [offset, setOffset] = useState(c);
  useEffect(() => {
    const t = setTimeout(() => setOffset(c - c * pct), 80);
    return () => clearTimeout(t);
  }, [c, pct]);
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ transition: "stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {children}
      </div>
    </div>
  );
}

function Toasts({ toasts }) {
  return (
    <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", zIndex: 999, display: "flex", flexDirection: "column", gap: 8, alignItems: "center" }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background: t.tone === "error" ? "linear-gradient(135deg, #6B2620, #4A1F1A)" : `linear-gradient(135deg, ${COLORS.ink}, #0A1410)`, color: COLORS.paper, padding: "11px 20px",
          borderRadius: 100, fontSize: 13.5, fontWeight: 600, boxShadow: "0 14px 34px -10px rgba(0,0,0,0.45)",
          display: "flex", alignItems: "center", gap: 8, animation: "ppToastIn .25s ease", whiteSpace: "nowrap",
        }}>
          <span style={{ width: 18, height: 18, borderRadius: "50%", background: t.tone === "error" ? "#FF6B5C" : COLORS.moss, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Icon name={t.tone === "error" ? "close" : "check"} size={11} color="#fff" />
          </span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

const inputStyle = {
  width: "100%", padding: "13px 15px", borderRadius: 12, border: `1.5px solid ${COLORS.paperLine}`,
  fontSize: 15, fontFamily: "inherit", background: COLORS.cream, color: COLORS.ink, outline: "none",
  boxSizing: "border-box", transition: "border-color .15s",
};
function TextInput(props) {
  const [focused, setFocused] = useState(false);
  return <input {...props}
    onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
    style={{ ...inputStyle, borderColor: focused ? COLORS.moss : COLORS.paperLine, ...(props.style || {}) }} />;
}

function PrimaryButton({ children, onClick, disabled, style, type = "button" }) {
  const [hover, setHover] = useState(false);
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: disabled ? "#B9C2AF" : `linear-gradient(135deg, ${COLORS.moss}, ${COLORS.mossDark})`,
        color: COLORS.cream, fontWeight: 700, fontSize: 15.5, padding: "15px 26px", borderRadius: 100,
        border: "none", cursor: disabled ? "not-allowed" : "pointer", width: "100%",
        boxShadow: disabled ? "none" : "0 16px 30px -16px rgba(8,122,42,0.6)",
        transition: "background .2s, transform .15s, box-shadow .2s", transform: hover && !disabled ? "translateY(-1px)" : "none",
        fontFamily: "inherit", ...style,
      }}>{children}</button>
  );
}

function GhostButton({ children, onClick, style }) {

}

function ScreenHeader({ title, onBack, right }) {

}

function TabBar({ active, onChange }) {
  const tabs = [
    { id: "dashboard", label: "Inicio", icon: "home", color: COLORS.moss, bg: COLORS.mossLight },
    { id: "nutrition", label: "Nutricion", icon: "bowl", color: COLORS.clayDark, bg: COLORS.clayLight },
    { id: "hydration", label: "Agua", icon: "drop", color: COLORS.waterDark, bg: COLORS.waterLight },
    { id: "training", label: "Entreno", icon: "dumbbell", color: COLORS.violetDark, bg: COLORS.violetLight },
    { id: "profile", label: "Perfil", icon: "user", color: COLORS.mossDark, bg: COLORS.mossLight },
  ];
  return (
    <div style={{ position: "sticky", bottom: 0, background: "rgba(255,255,255,0.97)", borderTop: "1px solid " + COLORS.paperLine, display: "flex", padding: "8px 8px 12px", zIndex: 10, boxShadow: "0 -18px 35px -28px rgba(20,32,26,0.45)", backdropFilter: "blur(18px)" }}>

        const isActive = active === t.id;
        return (

            background: isActive ? t.bg : "transparent", border: "none", cursor: "pointer", padding: "7px 0", borderRadius: 14,

        );
      })}

}

function Sheet({ open, onClose, title, children }) {

  return (

function WeekStrip({ todayStr }) {
  const today = new Date(todayStr + "T00:00:00");
  const labels = ["Lun", "Mar", "Mie", "Jue", "Vie", "Sab", "Dom"];
  const monday = new Date(today);
  const day = today.getDay() || 7;
  monday.setDate(today.getDate() - day + 1);
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 7, margin: "14px 20px 4px" }}>
      {labels.map((label, i) => {
        const d = new Date(monday); d.setDate(monday.getDate() + i);
        const active = d.toISOString().slice(0, 10) === todayStr;
        return (
          <div key={label} style={{ textAlign: "center", padding: "8px 0", borderRadius: 14, background: active ? `linear-gradient(160deg, ${COLORS.moss}, ${COLORS.mossDark})` : "rgba(255,255,255,0.78)", color: active ? "#fff" : COLORS.graphite, boxShadow: active ? "0 14px 26px -14px rgba(8,122,42,0.7)" : "0 6px 14px -10px rgba(20,32,26,0.18)", transform: active ? "translateY(-2px) scale(1.04)" : "none", transition: "all .2s" }}>
            <div style={{ fontSize: 9.5, fontWeight: 800 }}>{label}</div>
            <div style={{ fontSize: 12.5, fontWeight: 900, marginTop: 2 }}>{d.getDate()}</div>
          </div>
        );
      })}
    </div>
  );
}

function MacroBar({ label, value, goal, color }) {
  const pct = Math.min(100, (value / goal) * 100 || 0);
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, marginBottom: 4, color: COLORS.mossDark }}>
        <span>{label}</span>
        <span style={{ fontFamily: "'Space Mono', monospace" }}>{Math.round(value)}g / {goal}g</span>
      </div>
      <div style={{ height: 7, background: "rgba(255,255,255,0.5)", borderRadius: 4, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 4, transition: "width .6s ease" }} />
      </div>
    </div>
  );
}

// ─── App principal ────────────────────────────────────────────────────────────
function ProgressPlusApp() {
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState(null);
  const [activeTab, setActiveTab] = useState("dashboard");
  const { toasts, push } = useToast();

  const [mealSheetOpen, setMealSheetOpen] = useState(false);
  const [mealSlot, setMealSlot] = useState("desayuno");
  const [mealSearch, setMealSearch] = useState("");
  const [manualMeal, setManualMeal] = useState({ name: "", kcal: "" });

  const [waterCustom, setWaterCustom] = useState("");
  const [workoutSheetOpen, setWorkoutSheetOpen] = useState(false);
  const [workoutForm, setWorkoutForm] = useState({ type: "cardio", duration: "30", intensity: "media" });
  const [weightSheetOpen, setWeightSheetOpen] = useState(false);
  const [weightInput, setWeightInput] = useState("");
  const [editProfileOpen, setEditProfileOpen] = useState(false);
  const [editForm, setEditForm] = useState(null);
  const [statsRange, setStatsRange] = useState("semana");
  const [quickSheetOpen, setQuickSheetOpen] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY);
        const parsed = res ? JSON.parse(res.value) : defaultProfile();
        const migrated = {
          ...defaultProfile(), ...parsed,
          account: parsed.account || defaultProfile().account,
          profile: parsed.profile || defaultProfile().profile,
          goal: parsed.goal || defaultProfile().goal,
          onboardingDone: true,
        };
        setData(migrated);
      } catch (e) {
        setData(defaultProfile());
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const persist = useCallback(async (next) => {
    setData(next);
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(next)); }
    catch (e) { push("No se pudo guardar. Intentá de nuevo.", "error"); }
  }, [push]);

  const unlockAchievement = useCallback((id, current) => {
    if (current.achievements.includes(id)) return current;
    const def = ACHIEVEMENT_DEFS.find(a => a.id === id);
    push(`Logro desbloqueado: ${def.label}`, "ok");
    return { ...current, achievements: [...current.achievements, id] };
  }, [push]);

  const todayStr = todayISO();
  const todayMeals = useMemo(() => (data ? data.meals.filter(m => m.date === todayStr) : []), [data, todayStr]);
  const todayWater = useMemo(() => (data ? data.water.filter(w => w.date === todayStr) : []), [data, todayStr]);
  const todayWorkouts = useMemo(() => (data ? data.workouts.filter(w => w.date === todayStr) : []), [data, todayStr]);
  const calorieGoal = useMemo(() => (data?.profile && data?.goal ? calcCalorieGoal(data.profile, data.goal) : 2000), [data]);
  const waterGoalMl = useMemo(() => (data?.profile ? calcWaterGoalMl(data.profile) : 2000), [data]);
  const macros = useMemo(() => macroSplit(calorieGoal, data?.goal), [calorieGoal, data]);
  const consumedKcal = useMemo(() => todayMeals.reduce((s, m) => s + m.kcal, 0), [todayMeals]);
  const consumedWater = useMemo(() => todayWater.reduce((s, w) => s + w.ml, 0), [todayWater]);
  const consumedProtein = useMemo(() => todayMeals.reduce((s, m) => s + (m.p || 0), 0), [todayMeals]);
  const consumedCarbs = useMemo(() => todayMeals.reduce((s, m) => s + (m.c || 0), 0), [todayMeals]);
  const consumedFat = useMemo(() => todayMeals.reduce((s, m) => s + (m.g || 0), 0), [todayMeals]);

  if (loading || !data) {
    return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 500, fontFamily: "'Inter',sans-serif", color: COLORS.graphite }}>Cargando…</div>;
  }

  function addMealFromCatalog(item) {
    const meal = { id: uid(), date: todayStr, slot: mealSlot, name: item.name, kcal: item.kcal, p: item.p, c: item.c, g: item.g, time: new Date().toISOString() };
    let next = { ...data, meals: [...data.meals, meal] };
    if (next.meals.length === 1) next = unlockAchievement("primer_registro", next);
    persist(next);
    push(`${item.name} agregado`);
    setMealSheetOpen(false); setMealSearch("");
  }

  function addManualMeal() {
    const kcal = parseFloat(manualMeal.kcal);
    if (!manualMeal.name.trim() || !kcal || kcal <= 0) { push("Completá nombre y calorías.", "error"); return; }
    const meal = { id: uid(), date: todayStr, slot: mealSlot, name: manualMeal.name.trim(), kcal, p: 0, c: 0, g: 0, time: new Date().toISOString() };
    let next = { ...data, meals: [...data.meals, meal] };
    if (next.meals.length === 1) next = unlockAchievement("primer_registro", next);
    persist(next);
    push(`${manualMeal.name} agregado`);
    setManualMeal({ name: "", kcal: "" }); setMealSheetOpen(false);
  }

  function addWater(ml) {
    const entry = { id: uid(), date: todayStr, ml, time: new Date().toISOString() };
    let next = { ...data, water: [...data.water, entry] };
    const totalToday = next.water.filter(w => w.date === todayStr).reduce((s, w) => s + w.ml, 0);
    if (totalToday >= waterGoalMl) {
      const last3 = Array.from(new Set(next.water.map(w => w.date))).slice(-3);
      if (last3.length >= 3) next = unlockAchievement("hidratacion_3", next);
    }
    persist(next);
    push(`+${ml}ml de agua registrados`);
  }

  function saveWorkout() {
    const duration = parseInt(workoutForm.duration, 10);
    if (!duration || duration <= 0) { push("Ingresá una duración válida.", "error"); return; }
    const typeDef = TRAINING_TYPES.find(t => t.id === workoutForm.type);
    const intensityMult = workoutForm.intensity === "alta" ? 1.25 : workoutForm.intensity === "baja" ? 0.8 : 1;
    const kcalBurned = Math.round(duration * typeDef.metPerMin * (data.profile?.weight || 70) * intensityMult);
    const workout = { id: uid(), date: todayStr, type: workoutForm.type, duration, intensity: workoutForm.intensity, kcalBurned, time: new Date().toISOString() };
    let next = { ...data, workouts: [...data.workouts, workout] };
    if (next.workouts.length >= 5) next = unlockAchievement("entreno_5", next);
    persist(next);
    push(`Entrenamiento registrado · ${kcalBurned} kcal estimadas`);
    setWorkoutSheetOpen(false); setWorkoutForm({ type: "cardio", duration: "30", intensity: "media" });
  }

  function saveWeight() {
    const w = parseFloat(weightInput);
    if (!w || w < 20 || w > 300) { push("Ingresá un peso válido.", "error"); return; }
    let next = { ...data, weightLog: [...data.weightLog, { id: uid(), date: todayStr, weight: w }], profile: { ...data.profile, weight: w } };
    if (data.weightLog.length === 0) next = unlockAchievement("peso_registrado", next);
    persist(next); push("Peso registrado");
    setWeightSheetOpen(false); setWeightInput("");
  }

  function saveEditProfile() {
    const age = parseInt(editForm.age, 10), weight = parseFloat(editForm.weight), height = parseFloat(editForm.height);
    if (!age || !weight || !height) { push("Completá todos los campos.", "error"); return; }
    persist({ ...data, profile: { ...data.profile, age, weight, height, sex: editForm.sex, activity: editForm.activity }, goal: editForm.goal });
    push("Perfil actualizado"); setEditProfileOpen(false);
  }

  function resetAllData() {
    const fresh = defaultProfile();
    persist(fresh);
    push("Se borraron todos tus datos");
  }

  const goalDef = GOALS.find(g => g.id === data.goal);
  const shellStyle = {
    fontFamily: "'Inter', sans-serif", background: COLORS.paper, color: COLORS.ink,
    minHeight: 620, maxWidth: 430, margin: "0 auto", position: "relative",
    borderRadius: 34, overflow: "hidden", border: "1px solid rgba(255,255,255,0.92)",
    boxShadow: "0 34px 80px -42px rgba(20,32,26,0.62)",
  };

  return (
    <div style={shellStyle}>
      <div style={{ paddingBottom: 8 }}>
        {activeTab === "dashboard" && <DashboardScreen data={data} todayStr={todayStr} consumedKcal={consumedKcal} calorieGoal={calorieGoal} consumedWater={consumedWater} waterGoalMl={waterGoalMl} todayWorkouts={todayWorkouts} goalDef={goalDef} onNavTab={setActiveTab} accountName={data.account?.name} />}
        {activeTab === "nutrition" && <NutritionScreen calorieGoal={calorieGoal} consumedKcal={consumedKcal} macros={macros} consumedProtein={consumedProtein} consumedCarbs={consumedCarbs} consumedFat={consumedFat} todayMeals={todayMeals} onOpenMealSheet={(slot) => { setMealSlot(slot); setMealSheetOpen(true); }} onDeleteMeal={(id) => { persist({ ...data, meals: data.meals.filter(m => m.id !== id) }); push("Comida eliminada"); }} />}
        {activeTab === "hydration" && <HydrationScreen consumedWater={consumedWater} waterGoalMl={waterGoalMl} onAddWater={addWater} waterCustom={waterCustom} setWaterCustom={setWaterCustom} onAddCustom={() => { const ml = parseInt(waterCustom, 10); if (!ml || ml <= 0 || ml > 5000) { push("Ingresá una cantidad válida en ml.", "error"); return; } addWater(ml); setWaterCustom(""); }} settings={data.settings} onToggleSetting={(key) => persist({ ...data, settings: { ...data.settings, [key]: !data.settings[key] } })} onSetFreq={(h) => persist({ ...data, settings: { ...data.settings, waterReminderFreqHours: h } })} />}
        {activeTab === "training" && <TrainingScreen todayWorkouts={todayWorkouts} weightLog={data.weightLog} onOpenWorkoutSheet={() => setWorkoutSheetOpen(true)} onOpenWeightSheet={() => setWeightSheetOpen(true)} />}
        {activeTab === "profile" && <ProfileStatsScreen data={data} goalDef={goalDef} statsRange={statsRange} setStatsRange={setStatsRange} onEditProfile={() => { setEditForm({ ...data.profile, goal: data.goal }); setEditProfileOpen(true); }} onLogout={() => {}} onResetData={resetAllData} calorieGoal={calorieGoal} waterGoalMl={waterGoalMl} />}
      </div>

      <FloatingAdd onClick={() => setQuickSheetOpen(true)} />
      <TabBar active={activeTab} onChange={setActiveTab} />

      <Sheet open={quickSheetOpen} onClose={() => setQuickSheetOpen(false)} title="Registro rápido">
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <QuickAction icon="bowl" label="Agregar comida" color={COLORS.clayDark} bg={COLORS.clayLight} onClick={() => { setQuickSheetOpen(false); setMealSlot("desayuno"); setMealSheetOpen(true); }} />
          <QuickAction icon="drop" label="Registrar agua" color={COLORS.waterDark} bg={COLORS.waterLight} onClick={() => { setQuickSheetOpen(false); setActiveTab("hydration"); }} />
          <QuickAction icon="dumbbell" label="Registrar entrenamiento" color={COLORS.violetDark} bg={COLORS.violetLight} onClick={() => { setQuickSheetOpen(false); setWorkoutSheetOpen(true); }} />
          <QuickAction icon="scale" label="Registrar peso" color={COLORS.mossDark} bg={COLORS.mossLight} onClick={() => { setQuickSheetOpen(false); setWeightSheetOpen(true); }} />
        </div>
      </Sheet>

      <Sheet open={mealSheetOpen} onClose={() => setMealSheetOpen(false)} title="Agregar comida">
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          {MEAL_SLOTS.map(s => <Chip key={s.id} active={mealSlot === s.id} onClick={() => setMealSlot(s.id)}>{s.label}</Chip>)}
        </div>
        <div style={{ position: "relative", marginBottom: 14 }}>
          <div style={{ position: "absolute", left: 14, top: 13 }}><Icon name="search" size={17} color={COLORS.graphite} /></div>
          <TextInput placeholder="Buscar alimento..." value={mealSearch} onChange={e => setMealSearch(e.target.value)} style={{ paddingLeft: 40 }} />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 240, overflowY: "auto", marginBottom: 18 }}>
          {FOOD_CATALOG.filter(f => f.name.toLowerCase().includes(mealSearch.toLowerCase())).map(f => (
            <div key={f.name} onClick={() => addMealFromCatalog(f)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 14px", borderRadius: 14, background: COLORS.cream, border: `1px solid ${COLORS.paperLine}`, cursor: "pointer", transition: "background .15s" }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{f.name}</span>
              <span style={{ fontSize: 12, fontWeight: 700, fontFamily: "'Space Mono', monospace", color: COLORS.mossDark, background: COLORS.mossLight, padding: "3px 9px", borderRadius: 999 }}>{f.kcal} kcal</span>
            </div>
          ))}
        </div>
        <div style={{ borderTop: `1px solid ${COLORS.paperLine}`, paddingTop: 16 }}>
          <p style={{ fontSize: 12.5, fontWeight: 700, color: COLORS.graphite, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>O agregar manualmente</p>
          <div style={{ display: "flex", gap: 8 }}>
            <TextInput placeholder="Nombre del alimento" value={manualMeal.name} onChange={e => setManualMeal({ ...manualMeal, name: e.target.value })} style={{ flex: 2 }} />
            <TextInput placeholder="kcal" type="number" value={manualMeal.kcal} onChange={e => setManualMeal({ ...manualMeal, kcal: e.target.value })} style={{ flex: 1 }} />
          </div>
          <PrimaryButton onClick={addManualMeal} style={{ marginTop: 12 }}>Agregar</PrimaryButton>
        </div>
      </Sheet>

      <Sheet open={workoutSheetOpen} onClose={() => setWorkoutSheetOpen(false)} title="Registrar entrenamiento">
        <Field label="Tipo de entrenamiento">
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {TRAINING_TYPES.map(t => <Chip key={t.id} active={workoutForm.type === t.id} onClick={() => setWorkoutForm({ ...workoutForm, type: t.id })}>{t.label}</Chip>)}
          </div>
        </Field>
        <Field label="Duración (minutos)">
          <TextInput type="number" value={workoutForm.duration} onChange={e => setWorkoutForm({ ...workoutForm, duration: e.target.value })} />
        </Field>
        <Field label="Intensidad percibida">
          <div style={{ display: "flex", gap: 8 }}>
            {["baja", "media", "alta"].map(i => <Chip key={i} active={workoutForm.intensity === i} onClick={() => setWorkoutForm({ ...workoutForm, intensity: i })}>{i.charAt(0).toUpperCase() + i.slice(1)}</Chip>)}
          </div>
        </Field>
        <PrimaryButton onClick={saveWorkout} style={{ marginTop: 6 }}>Guardar entrenamiento</PrimaryButton>
      </Sheet>

      <Sheet open={weightSheetOpen} onClose={() => setWeightSheetOpen(false)} title="Registrar peso de hoy">
        <Field label="Peso actual (kg)">
          <TextInput type="number" placeholder={`Último: ${data.profile.weight} kg`} value={weightInput} onChange={e => setWeightInput(e.target.value)} />
        </Field>
        <PrimaryButton onClick={saveWeight}>Guardar</PrimaryButton>
      </Sheet>

      <Sheet open={editProfileOpen} onClose={() => setEditProfileOpen(false)} title="Editar perfil">
        {editForm && (
          <>
            <Field label="Nombre">
              <TextInput value={editForm.name || data.account?.name || ""} onChange={e => setEditForm({ ...editForm, name: e.target.value })} />
            </Field>
            <Field label="Edad"><TextInput type="number" value={editForm.age} onChange={e => setEditForm({ ...editForm, age: e.target.value })} /></Field>
            <Field label="Peso (kg)"><TextInput type="number" value={editForm.weight} onChange={e => setEditForm({ ...editForm, weight: e.target.value })} /></Field>
            <Field label="Altura (cm)"><TextInput type="number" value={editForm.height} onChange={e => setEditForm({ ...editForm, height: e.target.value })} /></Field>
            <Field label="Nivel de actividad">
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {ACTIVITY_LEVELS.map(a => <Chip key={a.id} active={editForm.activity === a.id} onClick={() => setEditForm({ ...editForm, activity: a.id })}>{a.label}</Chip>)}
              </div>
            </Field>
            <Field label="Objetivo">
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {GOALS.map(g => <Chip key={g.id} active={editForm.goal === g.id} onClick={() => setEditForm({ ...editForm, goal: g.id })}>{g.label}</Chip>)}
              </div>
            </Field>
            <PrimaryButton onClick={saveEditProfile} style={{ marginTop: 6 }}>Guardar cambios</PrimaryButton>
          </>
        )}
      </Sheet>

      <Toasts toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProgressPlusApp />);
</script>
</body>
</html>
